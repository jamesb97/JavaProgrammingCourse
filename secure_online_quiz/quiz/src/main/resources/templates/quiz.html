<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Application - Take Quiz</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        background: white;
        padding: 20px 30px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      .header h1 {
        color: #333;
        font-size: 24px;
      }

      .header-info {
        display: flex;
        gap: 30px;
        align-items: center;
      }

      .info-item {
        text-align: center;
      }

      .info-label {
        color: #666;
        font-size: 12px;
        font-weight: 500;
        text-transform: uppercase;
        margin-bottom: 5px;
      }

      .info-value {
        color: #333;
        font-size: 18px;
        font-weight: 600;
      }

      .btn-logout {
        padding: 10px 20px;
        background-color: #95a5a6;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
      }

      .btn-logout:hover {
        background-color: #7f8c8d;
        transform: translateY(-2px);
      }

      .content {
        background: white;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        padding: 40px;
      }

      .quiz-title {
        text-align: center;
        margin-bottom: 40px;
        border-bottom: 2px solid #e0e0e0;
        padding-bottom: 20px;
      }

      .quiz-title h2 {
        color: #333;
        font-size: 28px;
        margin-bottom: 10px;
      }

      .quiz-title p {
        color: #666;
        font-size: 14px;
      }

      .question-container {
        margin-bottom: 40px;
        padding: 25px;
        background-color: #f8f9fa;
        border-radius: 8px;
        border-left: 4px solid #667eea;
      }

      .question-number {
        display: inline-block;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 10px;
      }

      .question-text {
        color: #333;
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 20px;
        line-height: 1.6;
      }

      .options-group {
        display: space;
      }

      .option-item {
        margin-bottom: 12px;
      }

      .option-item label {
        display: flex;
        align-items: center;
        padding: 15px;
        background: white;
        border: 2px solid #e0e0e0;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 14px;
        color: #555;
      }

      .option-item label:hover {
        background-color: #f0f4ff;
        border-color: #667eea;
      }

      .option-item input[type="radio"] {
        margin-right: 12px;
        cursor: pointer;
        width: 18px;
        height: 18px;
      }

      .option-item input[type="radio"]:checked + .option-text {
        color: #667eea;
        font-weight: 600;
      }

      .option-item input[type="radio"]:checked ~ .checkmark {
        display: block;
      }

      .option-text {
        flex: 1;
        transition: all 0.3s ease;
      }

      .option-item input[type="radio"]:checked ~ label {
        background-color: #f0f4ff;
        border-color: #667eea;
      }

      .alert {
        padding: 15px 20px;
        border-radius: 5px;
        margin-bottom: 20px;
        font-size: 14px;
        display: none;
      }

      .alert.show {
        display: block;
      }

      .alert-danger {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .alert-warning {
        background-color: #fff3cd;
        color: #856404;
        border: 1px solid #ffeeba;
      }

      .quiz-actions {
        display: flex;
        gap: 15px;
        margin-top: 40px;
        padding-top: 20px;
        border-top: 2px solid #e0e0e0;
        justify-content: center;
      }

      .btn {
        padding: 12px 40px;
        border: none;
        border-radius: 5px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
      }

      .btn-submit {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        min-width: 150px;
      }

      .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }

      .btn-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .btn-reset {
        background-color: #95a5a6;
        color: white;
        min-width: 150px;
      }

      .btn-reset:hover {
        background-color: #7f8c8d;
        transform: translateY(-2px);
      }

      .loading {
        text-align: center;
        padding: 60px 20px;
        color: #666;
      }

      .spinner {
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 4px solid #e0e0e0;
        border-top-color: #667eea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #666;
      }

      .empty-state h2 {
        font-size: 24px;
        color: #333;
        margin-bottom: 15px;
      }

      .empty-state p {
        font-size: 16px;
        margin-bottom: 20px;
      }

      .progress-bar {
        background-color: #e0e0e0;
        height: 8px;
        border-radius: 4px;
        margin-bottom: 20px;
        overflow: hidden;
      }

      .progress-fill {
        background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        height: 100%;
        border-radius: 4px;
        transition: width 0.3s ease;
      }

      .progress-info {
        text-align: right;
        font-size: 12px;
        color: #666;
        margin-top: 5px;
      }

      .timer {
        font-size: 14px;
        color: #e74c3c;
        font-weight: 600;
      }

      @media (max-width: 768px) {
        .header {
          flex-direction: column;
          gap: 20px;
        }

        .header-info {
          flex-direction: column;
          gap: 15px;
          width: 100%;
        }

        .quiz-actions {
          flex-direction: column;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <div>
          <h1>Quiz Application</h1>
        </div>
        <div class="header-info">
          <div class="info-item">
            <div class="info-label">Total Questions</div>
            <div class="info-value" id="totalQuestions">0</div>
          </div>
          <div class="info-item">
            <div class="info-label">Answered</div>
            <div class="info-value" id="answeredCount">0</div>
          </div>
          <a href="/quiz/logout" th:href="@{/quiz/logout}" class="btn-logout"
            >Logout</a
          >
        </div>
      </div>

      <!-- Content -->
      <div class="content">
        <!-- Alert Messages -->
        <div class="alert alert-danger" id="errorAlert"></div>
        <div class="alert alert-warning" id="warningAlert"></div>

        <!-- Progress Bar -->
        <div id="progressSection" style="display: none">
          <div class="progress-bar">
            <div
              class="progress-fill"
              id="progressFill"
              style="width: 0%"
            ></div>
          </div>
          <div class="progress-info">
            <span id="progressText">0/0 answered</span>
          </div>
        </div>

        <!-- Quiz Title -->
        <div class="quiz-title">
          <h2>Secure Online Quiz</h2>
          <p>Answer all questions and submit your responses</p>
        </div>

        <!-- Loading Indicator -->
        <div class="loading" id="loadingIndicator">
          <div class="spinner"></div>
          <span>Loading quiz questions...</span>
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none">
          <h2>No Questions Available</h2>
          <p>There are currently no quiz questions available.</p>
          <p>Please contact your administrator.</p>
        </div>

        <!-- Quiz Form -->
        <form id="quizForm" style="display: none" novalidate>
          <!-- Questions Container -->
          <div id="questionsContainer"></div>

          <!-- Quiz Actions -->
          <div class="quiz-actions">
            <button type="reset" class="btn btn-reset" onclick="resetAnswers()">
              Clear Answers
            </button>
            <button type="submit" class="btn btn-submit" id="submitBtn">
              Submit Quiz
            </button>
          </div>
        </form>
      </div>
    </div>

    <script>
      let allQuestions = [];
      const answersMap = {};

      // Load questions on page load
      document.addEventListener("DOMContentLoaded", function () {
        loadQuizzes();
      });

      function loadQuizzes() {
        fetch("/quiz/questions")
          .then((response) => {
            if (!response.ok) {
              throw new Error("Failed to load questions");
            }
            return response.json();
          })
          .then((questions) => {
            allQuestions = questions;
            displayQuiz(questions);
          })
          .catch((error) => {
            console.error("Error loading questions:", error);
            showError(
              "Failed to load quiz questions. Please refresh the page.",
            );
            document.getElementById("loadingIndicator").style.display = "none";
          });
      }

      function displayQuiz(questions) {
        document.getElementById("loadingIndicator").style.display = "none";

        if (questions.length === 0) {
          document.getElementById("emptyState").style.display = "block";
          return;
        }

        document.getElementById("quizForm").style.display = "block";
        document.getElementById("progressSection").style.display = "block";
        document.getElementById("totalQuestions").textContent =
          questions.length;

        const container = document.getElementById("questionsContainer");
        container.innerHTML = "";

        questions.forEach((question, index) => {
          const questionDiv = document.createElement("div");
          questionDiv.className = "question-container";
          questionDiv.id = `question_${question.id}`;

          const optionsHTML = question.options
            .map(
              (option, optionIndex) => `
                    <div class="option-item">
                        <label>
                            <input 
                                type="radio" 
                                name="question_${question.id}" 
                                value="${option}"
                                onchange="updateProgress()">
                            <span class="option-text">${escapeHtml(option)}</span>
                        </label>
                    </div>
                `,
            )
            .join("");

          questionDiv.innerHTML = `
                    <div class="question-number">Question ${index + 1} of ${questions.length}</div>
                    <div class="question-text">${escapeHtml(question.questionText)}</div>
                    <div class="options-group">
                        ${optionsHTML}
                    </div>
                `;

          container.appendChild(questionDiv);
        });

        updateProgress();
      }

      function updateProgress() {
        let answeredCount = 0;
        allQuestions.forEach((question) => {
          const selectedAnswer = document.querySelector(
            `input[name="question_${question.id}"]:checked`,
          );
          if (selectedAnswer) {
            answeredCount++;
            answersMap[question.id] = selectedAnswer.value;
          }
        });

        document.getElementById("answeredCount").textContent = answeredCount;
        const progressPercent = (answeredCount / allQuestions.length) * 100;
        document.getElementById("progressFill").style.width =
          progressPercent + "%";
        document.getElementById("progressText").textContent =
          `${answeredCount}/${allQuestions.length} answered`;
      }

      function resetAnswers() {
        if (
          confirm(
            "Are you sure you want to clear all your answers? This action cannot be undone.",
          )
        ) {
          document.getElementById("quizForm").reset();
          Object.keys(answersMap).forEach((key) => delete answersMap[key]);
          updateProgress();
        }
      }

      // Form submission
      const form = document.getElementById("quizForm");
      form.addEventListener("submit", function (e) {
        e.preventDefault();

        // Validate that all questions are answered
        if (Object.keys(answersMap).length !== allQuestions.length) {
          showWarning("Please answer all questions before submitting.");
          return;
        }

        // Confirm submission
        if (
          !confirm(
            "Are you sure you want to submit your quiz? You cannot change your answers after submission.",
          )
        ) {
          return;
        }

        // Prepare answers data
        const answersData = {};
        allQuestions.forEach((question) => {
          answersData[question.id] = answersMap[question.id];
        });

        // Disable submit button
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.disabled = true;
        submitBtn.textContent = "Submitting...";

        // Submit answers
        fetch("/quiz/submit-answers", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(answersData),
        })
          .then((response) => {
            if (!response.ok) {
              throw new Error("Failed to submit quiz");
            }
            return response.json();
          })
          .then((data) => {
            if (data.success) {
              // Store results and redirect
              sessionStorage.setItem("quizResults", JSON.stringify(data));
              window.location.href = "/quiz/result";
            } else {
              showError(
                data.message || "Failed to submit quiz. Please try again.",
              );
              submitBtn.disabled = false;
              submitBtn.textContent = "Submit Quiz";
            }
          })
          .catch((error) => {
            console.error("Error:", error);
            showError("Error submitting quiz. Please try again.");
            submitBtn.disabled = false;
            submitBtn.textContent = "Submit Quiz";
          });
      });

      function showError(message) {
        const alert = document.getElementById("errorAlert");
        alert.textContent = message;
        alert.classList.add("show");
        setTimeout(() => {
          alert.classList.remove("show");
        }, 7000);
      }

      function showWarning(message) {
        const alert = document.getElementById("warningAlert");
        alert.textContent = message;
        alert.classList.add("show");
        setTimeout(() => {
          alert.classList.remove("show");
        }, 5000);
      }

      function escapeHtml(text) {
        const map = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        };
        return text.replace(/[&<>"']/g, (m) => map[m]);
      }
    </script>
  </body>
</html>
