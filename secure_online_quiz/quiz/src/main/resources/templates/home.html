<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Application - Redirecting</title>
    <!-- Meta redirect to login page after 1 second -->
    <meta http-equiv="refresh" content="1;url=/quiz/login" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        text-align: center;
        color: white;
      }

      .loader {
        margin-bottom: 30px;
      }

      .spinner {
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top: 4px solid white;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      h1 {
        font-size: 28px;
        margin-bottom: 10px;
        font-weight: 600;
      }

      p {
        font-size: 16px;
        margin-bottom: 20px;
        opacity: 0.9;
      }

      .redirect-link {
        display: inline-block;
        padding: 12px 30px;
        background-color: white;
        color: #667eea;
        text-decoration: none;
        border-radius: 5px;
        font-weight: 600;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
        margin-top: 15px;
      }

      .redirect-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      .redirect-link:active {
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="loader">
        <div class="spinner"></div>
      </div>

      <h1>Welcome to Online Quiz Application</h1>
      <p>Redirecting you to the login page...</p>

      <!-- Fallback link if JavaScript is disabled or meta redirect fails -->
      <p>
        <a href="/quiz/login" th:href="@{/quiz/login}" class="redirect-link">
          Click here if not redirected automatically
        </a>
      </p>
    </div>

    <script>
      // JavaScript redirect as a backup to meta redirect
      // Redirects to login page after 1 second
      setTimeout(function () {
        window.location.href = "/quiz/login";
      }, 1000);
    </script>
  </body>
</html>
@GetMapping("/") public String home() { return "home"; }
